<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Auth Service UI{% endblock %}</title>
    <style>
      :root {
        --bg: #f4efe6;
        --bg-soft: #efe6d8;
        --panel: #fff9f0;
        --ink: #1f1f1f;
        --ink-soft: #5f5a53;
        --accent: #127475;
        --accent-strong: #0b5253;
        --danger: #b0413e;
        --ok: #2b7a0b;
        --ring: rgba(18, 116, 117, 0.25);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #f8c5a8 0%, transparent 35%),
          radial-gradient(circle at 90% 90%, #c2e7d9 0%, transparent 30%),
          linear-gradient(160deg, var(--bg), var(--bg-soft));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .wrap {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        background: var(--panel);
        border: 1px solid #e7dccb;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 16px 50px rgba(15, 28, 42, 0.12);
        animation: rise 0.55s ease;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hero {
        padding: 40px;
        background: linear-gradient(145deg, #f3bfa1, #f6e7c8);
        border-right: 1px solid #e9d9c4;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(31, 31, 31, 0.08);
        font-size: 12px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(1.9rem, 3vw, 2.7rem);
        line-height: 1.05;
      }

      .sub {
        margin: 0;
        color: var(--ink-soft);
        max-width: 30ch;
        line-height: 1.45;
      }

      .panel {
        padding: 34px;
      }

      .messages {
        margin-bottom: 16px;
        display: grid;
        gap: 8px;
      }

      .msg {
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 0.95rem;
      }

      .msg.error {
        background: #fce7e7;
        color: var(--danger);
      }
      .msg.success {
        background: #e8f7df;
        color: var(--ok);
      }
      .msg.info {
        background: #e7f1fc;
        color: #24598a;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 10px 0 6px;
        font-size: 0.93rem;
      }

      input {
        width: 100%;
        border: 1px solid #d6c9b5;
        border-radius: 10px;
        padding: 11px 12px;
        font-size: 0.96rem;
        background: #fff;
      }

      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
      }

      .btn {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        padding: 12px 14px;
        font-size: 0.97rem;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.1s ease,
          background 0.2s ease;
      }

      .btn:hover {
        background: var(--accent-strong);
      }
      .btn:active {
        transform: translateY(1px);
      }

      .meta {
        margin-top: 12px;
        color: var(--ink-soft);
        font-size: 0.93rem;
      }

      .meta a {
        color: var(--accent-strong);
        font-weight: 700;
        text-decoration: none;
      }

      .meta a:hover {
        text-decoration: underline;
      }

      @media (max-width: 840px) {
        .wrap {
          grid-template-columns: 1fr;
        }
        .hero {
          border-right: 0;
          border-bottom: 1px solid #e9d9c4;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <aside class="hero">
        <span class="badge">Sample UI</span>
        <h1>Reusable Auth Frontend</h1>
        <p class="sub">
          Use this starter as a drop-in UI for signup, login, and a protected
          dashboard while integrating your API into other projects.
        </p>
      </aside>
      <section class="panel">
        {% if messages %}
        <div class="messages">
          {% for message in messages %}
          <div class="msg {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
        {% endif %} {% block content %}{% endblock %}
      </section>
    </main>
  </body>
</html>
