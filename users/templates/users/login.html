{% extends "users/base.html" %} {% block title %}Login | Auth Service{% endblock
%} {% block content %}
<h2>Sign in</h2>
<form method="post" novalidate>
  {% csrf_token %}
  <label for="email">Email</label>
  <input
    id="email"
    name="email"
    type="email"
    required
    placeholder="you@company.com"
  />

  <label for="password">Password</label>
  <input
    id="password"
    name="password"
    type="password"
    required
    placeholder="Enter password"
  />

  <button class="btn" type="submit">Login</button>
</form>
<p class="meta">
  Need an account? <a href="{% url 'sample_register' %}">Create one</a>
</p>
{% endblock %}
