{% extends "users/base.html" %}
{% block title %} Register | Auth Service{%endblock %}
{% block content %}
<h2>Create account</h2>
<form method="post" novalidate>
  {% csrf_token %}
  <label for="email">Email</label>
  <input
    id="email"
    name="email"
    type="email"
    required
    placeholder="you@company.com"
  />

  <label for="company_name">Company name</label>
  <input
    id="company_name"
    name="company_name"
    type="text"
    required
    maxlength="20"
    placeholder="Acme Labs"
  />

  <label for="department_code">Department code</label>
  <input
    id="department_code"
    name="department_code"
    type="text"
    required
    maxlength="10"
    placeholder="ENG01"
  />

  <label for="password">Password</label>
  <input
    id="password"
    name="password"
    type="password"
    required
    placeholder="Choose a strong password"
  />

  <button class="btn" type="submit">Register</button>
</form>
<p class="meta">
  Already registered? <a href="{% url 'sample_login' %}">Login here</a>
</p>
{% endblock %}
